name: Build Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  # 优化 Rust 编译
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1
  # 优化 Node.js
  NODE_OPTIONS: "--max-old-space-size=4096"
  # 跳过不必要的检查
  SKIP_ENV_VALIDATION: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            arch: "arm64"
            platform_name: "macos-arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            arch: "x64"
            platform_name: "macos-x64"
          - platform: "ubuntu-22.04"
            args: ""
            arch: "x64"
            platform_name: "linux-amd64"
          - platform: "windows-latest"
            args: ""
            arch: "x64"
            platform_name: "windows-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # 使用缓存的包列表，避免每次都更新
          sudo apt-get update -qq
          # 并行安装，减少安装时间
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Rust setup (with target)
        if: matrix.target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust setup (default)
        if: ${{ !matrix.target }}
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          # 增加缓存键以提高命中率
          key: ${{ matrix.platform }}-${{ matrix.target || 'default' }}
          # 缓存更多目录
          cache-directories: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          # 保存部分构建产物
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # 指定缓存目录
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          # 使用 npm ci 代替 npm install，更快且更可靠
          npm ci --prefer-offline --no-audit --no-fund

      - name: Install frontend dependencies (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          # 使用 npm ci 代替 npm install，更快且更可靠
          npm ci --prefer-offline --no-audit --no-fund

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 优化 Tauri 构建
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZAugment ${{ github.ref_name }}"
          releaseBody: |
            ## 🚀 ZAugment ${{ github.ref_name }} 发布

            ### 更新内容
            1. 测试 GitHub Actions 构建优化效果
            2. 优化更新弹窗内容解析逻辑
            3. 提升应用整体性能和稳定性

            ### 📥 下载文件
            | 平台 | 文件名 |
            |------|--------|
            | **Windows** | `ZAugment_${{ github.ref_name }}_x64-setup.exe` |
            | **macOS (Intel)** | `ZAugment_${{ github.ref_name }}_x64.dmg` |
            | **macOS (Apple Silicon)** | `ZAugment_${{ github.ref_name }}_aarch64.dmg` |
            | **Linux (Ubuntu/Debian)** | `ZAugment_${{ github.ref_name }}_amd64.deb` |
            | **Linux (CentOS/RHEL)** | `ZAugment-${{ github.ref_name }}-1.x86_64.rpm` |

            ### 🔧 安装方法
            **Windows:** 下载 `.exe` 文件双击安装，如遇警告点击"更多信息" → "仍要运行"

            **macOS:** 下载对应芯片的 `.dmg` 文件拖拽到应用程序文件夹，如遇安装包已损坏运行：
            sudo xattr -rd com.apple.quarantine /Applications/ZAugment.app

            **Linux:**
            # Ubuntu/Debian
            sudo dpkg -i ZAugment_${{ github.ref_name }}_amd64.deb
            # CentOS/RHEL/Fedora
            sudo rpm -i ZAugment-${{ github.ref_name }}-1.x86_64.rpm


            ---
            **🔒 安全说明**: 如遇安全软件误报属正常现象
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn
