name: Build Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            arch: "arm64"
            platform_name: "macos-arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            arch: "x64"
            platform_name: "macos-x64"
          - platform: "ubuntu-22.04"
            args: ""
            arch: "x64"
            platform_name: "linux-amd64"
          - platform: "windows-latest"
            args: ""
            arch: "x64"
            platform_name: "windows-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup (with target)
        if: matrix.target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust setup (default)
        if: ${{ !matrix.target }}
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Clean and install frontend dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          npm install

      - name: Clean and install frontend dependencies (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZAugment ${{ github.ref_name }}"
          # 只包含主要安装包，移除多余文件
          includeDebug: false
          includeRelease: true
          releaseBody: |
            ## 🚀 ZAugment ${{ github.ref_name }} 发布

            ### 📦 支持平台
            - ✅ **Windows** - 支持 Windows 10+ 系统
            - ✅ **macOS** - 支持 Intel 和 Apple Silicon (M1/M2/M3) 芯片
            - ✅ **Linux** - 支持 Ubuntu/Debian/CentOS/Fedora 等发行版

            ### 📥 下载说明

            | 平台 | 文件名 | 说明 |
            |------|--------|------|
            | **Windows** | `ZAugment-${{ github.ref_name }}-windows-x64-setup.exe` | Windows 安装程序 |
            | **macOS (Intel)** | `ZAugment-${{ github.ref_name }}-macos-x64.dmg` | Intel Mac 安装包 |
            | **macOS (Apple Silicon)** | `ZAugment-${{ github.ref_name }}-macos-arm64.dmg` | M1/M2/M3 Mac 安装包 |
            | **Linux (Ubuntu/Debian)** | `ZAugment-${{ github.ref_name }}-linux-amd64.deb` | DEB 安装包 |
            | **Linux (CentOS/RHEL)** | `ZAugment-${{ github.ref_name }}-linux-x86_64.rpm` | RPM 安装包 |
            | **Linux (通用)** | `ZAugment-${{ github.ref_name }}-linux-amd64.AppImage` | 通用可执行文件 |

            ### 🔧 安装方法

            **Windows:**
            ```bash
            # 下载 .exe 文件，双击安装
            # 如果出现 Windows Defender 警告，点击"更多信息" -> "仍要运行"
            ```

            **macOS:**
            ```bash
            # 下载对应芯片的 .dmg 文件，拖拽到应用程序文件夹
            # 如果出现"无法打开，因为无法验证开发者"错误，请运行：
            sudo xattr -rd com.apple.quarantine /Applications/ZAugment.app
            ```

            **Linux:**
            ```bash
            # Ubuntu/Debian
            sudo dpkg -i ZAugment-*-linux-amd64.deb
            # 如果依赖问题，运行：sudo apt-get install -f

            # CentOS/RHEL/Fedora
            sudo rpm -i ZAugment-*-linux-x86_64.rpm

            # 通用 AppImage（推荐）
            chmod +x ZAugment-*-linux-amd64.AppImage
            ./ZAugment-*-linux-amd64.AppImage
            ```

            ### 🛠️ 常见问题解决

            #### macOS 安装问题
            - **问题**: "ZAugment已损坏，无法打开"
            - **解决**: `sudo xattr -rd com.apple.quarantine /Applications/ZAugment.app`
            - **问题**: 应用无法启动
            - **解决**: 在"系统偏好设置" -> "安全性与隐私" -> "通用"中点击"仍要打开"

            #### Linux 安装问题
            - **问题**: 缺少依赖库
            - **解决**: `sudo apt-get install libwebkit2gtk-4.0-37 libgtk-3-0 libayatana-appindicator3-1`
            - **问题**: AppImage 无法执行
            - **解决**: `sudo apt-get install fuse libfuse2` 然后 `chmod +x` 文件

            #### Windows 安装问题
            - **问题**: Windows Defender 阻止安装
            - **解决**: 点击"更多信息" -> "仍要运行"，或临时关闭实时保护
            - **问题**: 应用无法启动
            - **解决**: 确保已安装 Microsoft Edge WebView2 运行时

            ---

            **🔒 安全说明**: 本应用已通过多平台测试，如遇安全软件误报属正常现象
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn
