name: Build Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            arch: "arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            arch: "x64"

          - platform: "ubuntu-22.04"
            args: ""
            arch: "x64"
          - platform: "windows-latest"
            args: ""
            arch: "x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup (with target)
        if: matrix.target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust setup (default)
        if: "!matrix.target"
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Clean and install frontend dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          npm install

      - name: Clean and install frontend dependencies (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZAugment ${{ github.ref_name }}"
          tauriScript: tauri
          releaseBody: |
            ## 🚀 ZAugment ${{ github.ref_name }} 发布

            ### 📦 支持平台
            - ✅ **Windows** - 支持 Windows 10+ 系统
            - ✅ **macOS** - 支持 Intel 和 Apple Silicon (M1/M2/M3) 芯片
            - ✅ **Linux** - 支持 Ubuntu/Debian/CentOS/Fedora 等发行版

            ### 📥 下载说明

            | 平台 | 文件名 | 说明 |
            |------|--------|------|
            | **Windows** | `ZAugment-${{ github.ref_name }}-windows-x64-setup.exe` | Windows 安装程序 |
            | **macOS (Intel)** | `ZAugment-${{ github.ref_name }}-macos-x64.dmg` | Intel Mac 安装包 |
            | **macOS (Apple Silicon)** | `ZAugment-${{ github.ref_name }}-macos-arm64.dmg` | M1/M2/M3 Mac 安装包 |
            | **Linux (Ubuntu/Debian)** | `ZAugment-${{ github.ref_name }}-linux-amd64.deb` | DEB 安装包 |
            | **Linux (CentOS/RHEL)** | `ZAugment-${{ github.ref_name }}-linux-x86_64.rpm` | RPM 安装包 |
            | **Linux (通用)** | `ZAugment-${{ github.ref_name }}-linux-amd64.AppImage` | 通用可执行文件 |

            ### 🔧 安装方法

            **Windows:**
            ```bash
            # 下载 .exe 文件，双击安装
            ```

            **macOS:**
            ```bash
            # 下载对应芯片的 .dmg 文件，拖拽到应用程序文件夹
            ```

            **Linux:**
            ```bash
            # Ubuntu/Debian
            sudo dpkg -i ZAugment-${{ github.ref_name }}-linux-amd64.deb

            # CentOS/RHEL/Fedora
            sudo rpm -i ZAugment-${{ github.ref_name }}-linux-x86_64.rpm

            # 通用 AppImage
            chmod +x ZAugment-${{ github.ref_name }}-linux-amd64.AppImage
            ./ZAugment-${{ github.ref_name }}-linux-amd64.AppImage
            ```

            ### 🛠️ 常见安装问题解决方案

            **macOS 安全问题:**
            ```bash
            # 如果提示"无法验证开发者"，请运行：
            sudo xattr -rd com.apple.quarantine /Applications/ZAugment.app

            # 或者在系统偏好设置 > 安全性与隐私 > 通用 中点击"仍要打开"
            ```

            **Linux 权限问题:**
            ```bash
            # AppImage 权限问题
            chmod +x ZAugment-${{ github.ref_name }}-linux-amd64.AppImage

            # 缺少依赖（Ubuntu/Debian）
            sudo apt update
            sudo apt install libwebkit2gtk-4.0-37 libgtk-3-0

            # 缺少依赖（CentOS/RHEL）
            sudo yum install webkit2gtk3 gtk3
            ```

            **Windows 安装问题:**
            ```bash
            # 如果提示"Windows 已保护你的电脑"
            # 点击"更多信息" > "仍要运行"

            # 或者右键安装包 > 属性 > 解除阻止
            ```

            ---

            **支持 macOS 和 Linux 安装**
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: |
            src-tauri/target/release/bundle/**/*
            !src-tauri/target/release/bundle/**/.*
          retention-days: 30
          if-no-files-found: warn
